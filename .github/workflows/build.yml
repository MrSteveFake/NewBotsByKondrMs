name: Extract ZIP Archive

on:
  push:
    paths:
      - '*.zip'
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Extract ZIP archive
        run: |
          # Показать все файлы в репозитории для отладки
          echo "📁 Repository contents:"
          ls -la
          echo ""
          
          # Найти только ZIP файлы (исключая директории)
          zip_files=$(find . -maxdepth 1 -name "*.zip" -type f)
          
          echo "🔍 Found ZIP files:"
          echo "$zip_files"
          echo ""
          
          if [ -z "$zip_files" ]; then
            echo "❌ No ZIP files found in root directory"
            echo "Trying recursive search..."
            zip_files=$(find . -type f -name "*.zip")
            if [ -z "$zip_files" ]; then
              echo "❌ No ZIP files found anywhere"
              exit 1
            fi
          fi
          
          # Распаковать каждый найденный ZIP файл
          for zip_file in $zip_files; do
            echo "📦 Processing: $zip_file"
            
            # Получаем базовое имя файла без пути и расширения
            filename=$(basename "$zip_file" .zip)
            echo "  Archive name: $filename"
            
            # Создаем директорию для распаковки
            mkdir -p "extracted"
            
            # Распаковываем напрямую в extracted/
            unzip -o "$zip_file" -d "extracted/"
            
            echo "  ✅ Extracted successfully"
            echo ""
          done
          
          echo "📋 Extracted contents:"
          ls -la extracted/ | head -20
      
      - name: Upload extracted files
        uses: actions/upload-artifact@v4
        with:
          name: extracted-files
          path: extracted/
